name: Compile & Submit iOS App

on:
  push:
    branches:
      - main
    paths:
      - 'app-movil/**'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies in app-movil
        run: |
          cd app-movil
          npm install

      - name: Auto-increment build version
        run: |
          node -e "
            const fs = require('fs');
            const file = 'app-movil/app.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.expo.ios.buildNumber = process.env.GITHUB_RUN_NUMBER;
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
            console.log('Incremented buildNumber to:', process.env.GITHUB_RUN_NUMBER);
          "
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Stage app.json changes for EAS CLI
        run: git add app-movil/app.json

      - name: Build IPA Locally
        run: |
          cd app-movil
          eas build --platform ios --profile production --local --non-interactive --output $GITHUB_WORKSPACE/app.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: |
          cd app-movil
          eas submit --platform ios --profile production --non-interactive --path $GITHUB_WORKSPACE/app.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
